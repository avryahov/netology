- name: Configure Docker Swarm Cluster with Portainer
  hosts: nodes
  gather_facts: false
  become: true

  vars:
    ansible_ssh_user: ubuntu
    ansible_python_interpreter: /usr/bin/python3.8
    manager_node: node-1
    worker_nodes:
      - node-2
      - node-3
    portainer_node: node-1
    project_name: mystack
    project_dir: /opt/shvirtd-example-python
    local_project_path: "{{ lookup('env', 'HOME') }}/repositories/git/study/shvirtd-example-python"
    db_ip: "{{ docker_subnet | regex_replace('/\\d+$', '') }}10"
    web_ip: "{{ docker_subnet | regex_replace('/\\d+$', '') }}5"

  pre_tasks:
    - name: Validate SSH connectivity to all nodes
      ansible.builtin.wait_for:
        host: '{{ (ansible_ssh_host | default(ansible_host)) | default(inventory_hostname) }}'
        port: 22
        delay: 5
        timeout: 300
        state: started
        search_regex: OpenSSH

    - name: Check if Docker is installed
      ansible.builtin.shell: docker --version
      register: docker_version
      changed_when: false
      ignore_errors: true

    - name: Fail if Docker is not installed
      ansible.builtin.fail:
        msg: "Docker is not installed on {{ inventory_hostname }}."
      when: docker_version.rc != 0

    - name: Validate Docker Swarm subnet
      ansible.builtin.debug:
        msg: "Docker subnet is: {{ docker_subnet }}"
      run_once: true

    - name: Log Docker version
      ansible.builtin.debug:
        msg: "Docker is installed on {{ inventory_hostname }}: {{ docker_version.stdout }}"

  tasks:
    - name: Check if manager is in active swarm  # noqa run-once
      ansible.builtin.shell: docker info --format '{{ "{{ .Swarm.LocalNodeState }}" }}'
      delegate_to: "{{ manager_node }}"
      register: manager_swarm_status
      changed_when: false
      run_once: true

    - name: Initialize Docker Swarm on the manager node  # noqa run-once
      ansible.builtin.shell: docker swarm init --advertise-addr {{ hostvars[manager_node].ansible_host }}
      delegate_to: "{{ manager_node }}"
      when: manager_swarm_status.stdout != "active"
      changed_when: false
      run_once: true

    - name: Retrieve the join token for workers  # noqa run-once
      ansible.builtin.shell: docker swarm join-token -q worker
      delegate_to: "{{ manager_node }}"
      register: worker_join_token
      changed_when: false
      run_once: true

    - name: Check Swarm status on worker nodes
      ansible.builtin.shell: docker info --format '{{ "{{ .Swarm.LocalNodeState }}" }}'
      delegate_to: "{{ item }}"
      loop: "{{ worker_nodes }}"
      register: worker_swarm_state
      changed_when: false

    - name: Build worker status map
      ansible.builtin.set_fact:
        worker_swarm_state_map: >-
          {{
            dict(
              worker_swarm_state.results | map(attribute='item') | zip(
              worker_swarm_state.results | map(attribute='stdout'))
            )
          }}

    - name: Join worker nodes to the Swarm cluster
      delegate_to: "{{ item }}"
      loop: "{{ worker_nodes }}"
      when:
        - inventory_hostname == item
        - worker_swarm_state_map[item] != "active"
      ansible.builtin.shell: >
        docker swarm join --token {{ worker_join_token.stdout }}
        {{ hostvars[manager_node].ansible_host }}:2377
      register: join_result
      changed_when: false
      ignore_errors: true

    - name: Check if Portainer service is running  # noqa run-once
      ansible.builtin.shell: >
        docker service inspect portainer --format '{{ "{{ .Spec.Name }}" }}' || echo "false"
      delegate_to: "{{ portainer_node }}"
      register: portainer_status
      changed_when: false
      run_once: true

    - name: Run Portainer container  # noqa run-once
      ansible.builtin.shell: >
        docker service create
        --name portainer
        --publish 9000:9000
        --constraint 'node.role == manager'
        --mount type=bind,src=/var/run/docker.sock,dst=/var/run/docker.sock
        --mount type=volume,src=portainer_data,dst=/data
        portainer/portainer-ce:latest
      delegate_to: "{{ portainer_node }}"
      when: portainer_status.stdout != "portainer"
      changed_when: false
      run_once: true

    - name: Log Docker Swarm cluster setup completion  # noqa run-once
      ansible.builtin.debug:
        msg: "Docker Swarm cluster configured. Manager: {{ manager_node }}, Workers: {{ worker_nodes }}, Portainer: {{ portainer_node }}"
      run_once: true

    - name: Create project directory on the manager node  # noqa run-once
      ansible.builtin.file:
        path: "{{ project_dir }}"
        state: directory
      delegate_to: "{{ manager_node }}"
      run_once: true

    - name: Debug local project path  # noqa run-once
      debug:
        msg: "local_project_path={{ local_project_path }}"
      run_once: true

    - name: Copy project files to the manager node  # noqa run-once
      ansible.posix.synchronize:
        src: "{{ local_project_path }}/."
        dest: "{{ project_dir }}"
        recursive: true
      delegate_to: localhost
      become: false
      run_once: true
      vars:
        ansible_python_interpreter: /opt/homebrew/bin/python3

    - name: Replace subnet in compose.stack.yaml  # noqa run-once
      ansible.builtin.replace:
        path: "{{ project_dir }}/compose.stack.yaml"
        regexp: 'subnet: 172.20.0.0/24'
        replace: 'subnet: {{ docker_subnet }}'
      delegate_to: "{{ manager_node }}"
      run_once: true

    - name: Replace DB IP in compose.stack.yaml  # noqa run-once
      ansible.builtin.replace:
        path: "{{ project_dir }}/compose.stack.yaml"
        regexp: 'ipv4_address: 172.20.0.10'
        replace: 'ipv4_address: {{ db_ip }}'
      delegate_to: "{{ manager_node }}"
      run_once: true

    - name: Replace Web IP in compose.stack.yaml  # noqa run-once
      ansible.builtin.replace:
        path: "{{ project_dir }}/compose.stack.yaml"
        regexp: 'ipv4_address: 172.20.0.5'
        replace: 'ipv4_address: {{ web_ip }}'
      delegate_to: "{{ manager_node }}"
      run_once: true

    - name: Replace subnet in compose.stack.yaml  # noqa run-once
      ansible.builtin.replace:
        path: "{{ project_dir }}/compose.stack.yaml"
        regexp: 'subnet: 172.20.0.0/24'
        replace: 'subnet: {{ docker_subnet }}'
      delegate_to: "{{ manager_node }}"
      run_once: true

    - name: Verify changes in compose.stack.yaml  # noqa run-once
      ansible.builtin.shell: >
        cat "{{ project_dir }}/compose.stack.yaml"
      delegate_to: "{{ manager_node }}"
      register: compose_content
      run_once: true

    - name: Display updated compose.stack.yaml  # noqa run-once
      ansible.builtin.debug:
        msg: "{{ compose_content.stdout }}"
      run_once: true

    - name: Deploy the stack using compose.stack.yaml  # noqa run-once
      ansible.builtin.shell: >
        cd {{ project_dir }} &&
        docker stack deploy -c compose.stack.yaml {{ project_name }}
      delegate_to: "{{ manager_node }}"
      run_once: true

    - name: Verify stack deployment  # noqa run-once
      ansible.builtin.shell: docker stack ps {{ project_name }}
      delegate_to: "{{ manager_node }}"
      register: stack_status
      run_once: true

    - name: Display stack deployment status
      ansible.builtin.debug:
        msg: "{{ stack_status.stdout }}"
