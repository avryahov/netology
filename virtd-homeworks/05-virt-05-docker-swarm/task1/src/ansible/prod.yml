---
- name: Configure Docker Swarm Cluster with Portainer
  gather_facts: false
  hosts: nodes
  vars:
    ansible_ssh_user: ubuntu
    ansible_python_interpreter: /usr/bin/python3.8

  become: true

  pre_tasks:
    - name: Validate SSH connectivity to all nodes
      ansible.builtin.wait_for:
        host: '{{ (ansible_ssh_host | default(ansible_host)) | default(inventory_hostname) }}'
        port: 22
        delay: 5
        timeout: 300
        state: started
        search_regex: OpenSSH

    - name: Check if Docker is installed
      ansible.builtin.command: docker --version
      register: docker_version
      changed_when: false
      failed_when: docker_version.rc != 0
      delegate_to: "{{ inventory_hostname }}"

    - name: Log Docker version
      ansible.builtin.debug:
        msg: "Docker is installed on {{ inventory_hostname }}: {{ docker_version.stdout }}"

    - name: Dynamically assign roles to nodes
      # noqa run-once
      ansible.builtin.set_fact:
        manager_node: "node-1"
        worker_nodes: ["node-2", "node-3", "node-4"]
        portainer_node: "node-1"
      run_once: true

  tasks:
    - name: Check if the node is already part of a swarm
      # noqa run-once
      delegate_to: "{{ manager_node }}"
      run_once: true
      ansible.builtin.command: docker info --format '{% raw %}{{ .Swarm.LocalNodeState }}{% endraw %}'
      register: swarm_state
      changed_when: false
      ignore_errors: true

    - name: Initialize Docker Swarm on the manager node
      # noqa run-once
      delegate_to: "{{ manager_node }}"
      run_once: true
      when: swarm_state.stdout != "active"
      ansible.builtin.command: >
        docker swarm init --advertise-addr {{ hostvars[manager_node].ansible_host }}
      register: swarm_init
      changed_when: "'Swarm initialized' in swarm_init.stdout"

    - name: Retrieve the join token for workers
      # noqa run-once
      delegate_to: "{{ manager_node }}"
      run_once: true
      ansible.builtin.command: docker swarm join-token worker -q
      register: worker_join_token
      changed_when: false

    - name: Check if worker nodes are already part of a swarm
      run_once: true
      ansible.builtin.command: docker info --format '{% raw %}{{ .Swarm.LocalNodeState }}{% endraw %}'
      loop: "{{ worker_nodes }}"
      loop_control:
        label: "{{ item }}"
      delegate_to: "{{ item }}"
      register: worker_swarm_state
      changed_when: false
      ignore_errors: true

    - name: Set worker swarm state map
      run_once: true
      ansible.builtin.set_fact:
        worker_swarm_state_map: >-
          {{
            dict(
              worker_swarm_state.results | map(attribute='item') | zip(
              worker_swarm_state.results | map(attribute='stdout'))
            )
          }}

    - name: Join worker nodes to the Swarm cluster
      delegate_to: "{{ item }}"
      loop: "{{ worker_nodes }}"
      when:
        - inventory_hostname == item
        - worker_swarm_state_map[item] != "active"
      ansible.builtin.shell: >
        docker swarm join --token {{ worker_join_token.stdout }}
        {{ hostvars[manager_node].ansible_host }}:2377
      register: join_result
      changed_when: "'This node joined a swarm' in join_result.stdout"
      ignore_errors: true

    # Portainer setup
    - name: Check if Portainer container exists and is running
      # noqa run-once
      delegate_to: "{{ portainer_node }}"
      run_once: true
      ansible.builtin.shell: >
        docker inspect -f '{% raw %}{{ .State.Running }}{% endraw %}' portainer || echo "false"
      register: portainer_status
      changed_when: false

    - name: Remove existing Portainer container if it is not running
      # noqa run-once
      delegate_to: "{{ portainer_node }}"
      run_once: true
      when: portainer_status.stdout != "true"
      ansible.builtin.shell: >
        docker rm -f portainer
      changed_when: true
      failed_when: false

    - name: Pull Portainer image
      # noqa run-once
      delegate_to: "{{ portainer_node }}"
      run_once: true
      when: portainer_status.stdout != "true"
      ansible.builtin.shell: >
        docker pull portainer/portainer-ce:latest
      changed_when: false

    - name: Run Portainer container
      # noqa run-once
      delegate_to: "{{ portainer_node }}"
      run_once: true
      when: portainer_status.stdout != "true"
      ansible.builtin.shell: >
        docker run -d \
          --name portainer \
          --restart always \
          -p 9000:9000 \
          -v /var/run/docker.sock:/var/run/docker.sock \
          -v portainer_data:/data \
          portainer/portainer-ce:latest
      changed_when: false

    - name: Log Portainer installation message
      # noqa run-once
      delegate_to: "{{ portainer_node }}"
      run_once: true
      when: portainer_status.stdout != "true"
      ansible.builtin.debug:
        msg: "Portainer has been successfully installed on {{ portainer_node }}"

    - name: Log Docker Swarm cluster setup completion
      # noqa run-once
      run_once: true
      ansible.builtin.debug:
        msg: "Docker Swarm cluster has been successfully configured. Manager: {{ manager_node }}, Workers: {{ worker_nodes }}, Portainer: {{ portainer_node }}"