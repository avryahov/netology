- name: Configure Docker Swarm Cluster with Portainer
  hosts: nodes
  gather_facts: false
  become: true

  vars:
    ansible_ssh_user: ubuntu
    ansible_python_interpreter: /usr/bin/python3.8
    manager_node: node-1
    worker_nodes:
      - node-2
      - node-3
    portainer_node: node-1

  pre_tasks:
    - name: Validate SSH connectivity to all nodes
      ansible.builtin.wait_for:
        host: '{{ (ansible_ssh_host | default(ansible_host)) | default(inventory_hostname) }}'
        port: 22
        delay: 5
        timeout: 300
        state: started
        search_regex: OpenSSH

    - name: Check if Docker is installed  # noqa run-once
      ansible.builtin.shell: docker --version
      register: docker_version
      changed_when: false
      ignore_errors: true

    - name: Fail if Docker is not installed  # noqa run-once
      ansible.builtin.fail:
        msg: "Docker is not installed on {{ inventory_hostname }}."
      when: docker_version.rc != 0

    - name: Log Docker version  # noqa run-once
      ansible.builtin.debug:
        msg: "Docker is installed on {{ inventory_hostname }}: {{ docker_version.stdout }}"

  tasks:
    # SWARM SETUP

    - name: Check if manager is in active swarm # noqa run-once
      ansible.builtin.shell: docker info --format '{{ "{{ .Swarm.LocalNodeState }}" }}'
      delegate_to: "{{ manager_node }}"
      register: manager_swarm_status
      changed_when: false
      run_once: true

    - name: Initialize Docker Swarm on the manager node  # noqa run-once
      ansible.builtin.shell: docker swarm init --advertise-addr {{ hostvars[manager_node].ansible_host }}
      delegate_to: "{{ manager_node }}"
      when: manager_swarm_status.stdout != "active"
      changed_when: false
      run_once: true

    - name: Retrieve the join token for workers # noqa run-once
      ansible.builtin.shell: docker swarm join-token -q worker
      delegate_to: "{{ manager_node }}"
      register: worker_join_token
      changed_when: false
      run_once: true

    - name: Check Swarm status on worker nodes # noqa run-once
      ansible.builtin.shell: docker info --format '{{ "{{ .Swarm.LocalNodeState }}" }}'
      delegate_to: "{{ item }}"
      loop: "{{ worker_nodes }}"
      register: worker_swarm_state
      changed_when: false
      run_once: true

    - name: Build worker status map # noqa run-once
      ansible.builtin.set_fact:
        worker_swarm_state_map: >-
          {{
            dict(
              worker_swarm_state.results | map(attribute='item') | zip(
              worker_swarm_state.results | map(attribute='stdout'))
            )
          }}
      run_once: true

    - name: Join worker nodes to the Swarm cluster
      delegate_to: "{{ item }}"
      loop: "{{ worker_nodes }}"
      when:
        - inventory_hostname == item
        - worker_swarm_state_map[item] != "active"
      ansible.builtin.shell: >
        docker swarm join --token {{ worker_join_token.stdout }}
        {{ hostvars[manager_node].ansible_host }}:2377
      register: join_result
      changed_when: false
      ignore_errors: true

    # PORTAINER SETUP

    - name: Check if Portainer service is running # noqa run-once
      ansible.builtin.shell: >
        docker inspect -f '{% raw %}{{ .State.Running }}{% endraw %}' portainer || echo "false"
        delegate_to: "{{ portainer_node }}"
      register: portainer_status
      changed_when: false
      run_once: true

    - name: Run Portainer container  # noqa run-once
      ansible.builtin.shell: >
        docker service create
        --name portainer
        --publish 9000:9000
        --constraint 'node.role == manager'
        --mount type=bind,src=/var/run/docker.sock,dst=/var/run/docker.sock
        --mount type=volume,src=portainer_data,dst=/data
        portainer/portainer-ce:latest
      delegate_to: "{{ portainer_node }}"
      when: portainer_status.stdout != "true"
      changed_when: false
      run_once: true

    - name: Log Docker Swarm cluster setup completion # noqa run-once
      ansible.builtin.debug:
        msg: "Docker Swarm cluster configured. Manager: {{ manager_node }}, Workers: {{ worker_nodes }}, Portainer: {{ portainer_node }}"
      run_once: true
