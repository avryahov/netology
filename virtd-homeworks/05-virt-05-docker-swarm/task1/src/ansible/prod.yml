---
- name: Configure Docker Swarm Cluster with Portainer
  hosts: nodes
  gather_facts: false
  become: true

  vars:
    ansible_ssh_user: ubuntu
    ansible_python_interpreter: /usr/bin/python3.8
    manager_node: node-1
    worker_nodes:
      - node-2
      - node-3
    portainer_node: node-1
    project_name: mystack
    project_dir: /opt/shvirtd-example-python
    local_project_path: "{{ lookup('env', 'HOME') }}/repositories/git/study/shvirtd-example-python"
    db_ip: "{{ docker_subnet | regex_replace('/\\d+$', '') }}10"
    web_ip: "{{ docker_subnet | regex_replace('/\\d+$', '') }}5"

  pre_tasks:
    # Проверка SSH-подключения ко всем узлам
    - name: Validate SSH connectivity to all nodes
      ansible.builtin.wait_for:
        host: '{{ (ansible_ssh_host | default(ansible_host)) | default(inventory_hostname) }}'
        port: 22
        delay: 5
        timeout: 300
        state: started
        search_regex: OpenSSH

    # Чтение файла из локального проекта
    - name: Load env.yml locally as vars
      include_vars:
        file: "{{ local_project_path }}/env.yml"
        name: env_vars
      run_once: true

    - name: Display parsed environment variables # noqa run-once
      debug:
        msg: "{{ env_vars }}"
      delegate_to: "{{ manager_node }}"
      run_once: true

    # Проверка наличия Docker
    - name: Check if Docker is installed
      ansible.builtin.shell: docker --version
      register: docker_version
      changed_when: false
      ignore_errors: true

    - name: Fail if Docker is not installed
      ansible.builtin.fail:
        msg: "Docker is not installed on {{ inventory_hostname }}."
      when: docker_version.rc != 0

    # Вывод информации о подсети Docker
    - name: Validate Docker Swarm subnet
      ansible.builtin.debug:
        msg: "Docker subnet is: {{ docker_subnet }}"
      run_once: true

    - name: Log Docker version
      ansible.builtin.debug:
        msg: "Docker is installed on {{ inventory_hostname }}: {{ docker_version.stdout }}"

  tasks:
    # Настройка Docker Swarm
    - name: Check if manager is in active swarm  # noqa run-once
      ansible.builtin.shell: docker info --format '{{ "{{ .Swarm.LocalNodeState }}" }}'
      delegate_to: "{{ manager_node }}"
      register: manager_swarm_status
      changed_when: false
      run_once: true

    - name: Initialize Docker Swarm on the manager node  # noqa run-once
      ansible.builtin.shell: docker swarm init --advertise-addr {{ hostvars[manager_node].ansible_host }}
      delegate_to: "{{ manager_node }}"
      when: manager_swarm_status.stdout != "active"
      changed_when: false
      run_once: true

    - name: Retrieve the join token for workers  # noqa run-once
      ansible.builtin.shell: docker swarm join-token -q worker
      delegate_to: "{{ manager_node }}"
      register: worker_join_token
      changed_when: false
      run_once: true

    - name: Check Swarm status on worker nodes
      ansible.builtin.shell: docker info --format '{{ "{{ .Swarm.LocalNodeState }}" }}'
      delegate_to: "{{ item }}"
      loop: "{{ worker_nodes }}"
      register: worker_swarm_state
      changed_when: false

    - name: Build worker status map
      ansible.builtin.set_fact:
        worker_swarm_state_map: >-
          {{
            dict(
              worker_swarm_state.results | map(attribute='item') | zip(
              worker_swarm_state.results | map(attribute='stdout'))
            )
          }}

    - name: Join worker nodes to the Swarm cluster
      delegate_to: "{{ item }}"
      loop: "{{ worker_nodes }}"
      when:
        - inventory_hostname == item
        - worker_swarm_state_map[item] != "active"
      ansible.builtin.shell: >
        docker swarm join --token {{ worker_join_token.stdout }}
        {{ hostvars[manager_node].ansible_host }}:2377
      register: join_result
      changed_when: false
      ignore_errors: true

    # Настройка Portainer
    - name: Check if Portainer service is running  # noqa run-once
      ansible.builtin.shell: >
        docker service inspect portainer --format '{{ "{{ .Spec.Name }}" }}' || echo "false"
      delegate_to: "{{ portainer_node }}"
      register: portainer_status
      changed_when: false
      run_once: true

    - name: Run Portainer container  # noqa run-once
      ansible.builtin.shell: >
        docker service create
        --name portainer
        --publish 9000:9000
        --constraint 'node.role == manager'
        --mount type=bind,src=/var/run/docker.sock,dst=/var/run/docker.sock
        --mount type=volume,src=portainer_data,dst=/data
        portainer/portainer-ce:latest
      delegate_to: "{{ portainer_node }}"
      when: portainer_status.stdout != "portainer"
      changed_when: false
      run_once: true

    # Развертывание проекта
    - name: Create project directory on the manager node  # noqa run-once
      ansible.builtin.file:
        path: "{{ project_dir }}"
        state: directory
        mode: '0755'
        owner: ubuntu
        group: ubuntu
      run_once: true

    - name: Create necessary directories for project  # noqa run-once
      ansible.builtin.file:
        path: "{{ project_dir }}/{{ item }}"
        state: directory
        mode: '0755'
        owner: ubuntu
        group: ubuntu
      loop:
        - haproxy/reverse
        - nginx/ingress
      run_once: true

    - name: Synchronize project files to the manager node  # noqa run-once
      ansible.posix.synchronize:
        src: "{{ local_project_path }}/{{ item.src }}"
        dest: "{{ project_dir }}/{{ item.dest | default(item.src) }}"
      delegate_to: localhost
      become: false
      loop:
        - { src: "Dockerfile.python" }
        - { src: "compose.stack.yaml" }
        - { src: "main.py" }
        - { src: "requirements.txt" }
        - { src: "haproxy/reverse/haproxy.cfg", dest: "haproxy/reverse/haproxy.cfg" }
        - { src: "nginx/ingress/default.conf", dest: "nginx/ingress/default.conf" }
        - { src: "nginx/ingress/nginx.conf", dest: "nginx/ingress/nginx.conf" }
      run_once: true
      vars:
        ansible_python_interpreter: "/opt/homebrew/bin/python3"

    # Сборка Docker-образа для сервиса web
    - name: Build Docker image for web service  # noqa run-once
      ansible.builtin.shell: >
        docker build
        -t shvirtd-example-python:latest
        -f {{ project_dir }}/Dockerfile.python
        {{ project_dir }}
      run_once: true

    - name: Update IPs and subnet in compose.stack.yaml  # noqa run-once
      ansible.builtin.replace:
        path: "{{ project_dir }}/compose.stack.yaml"
        regexp: "{{ item.regexp }}"
        replace: "{{ item.replace }}"
      loop:
        - { regexp: 'subnet: 172.20.0.0/24', replace: 'subnet: {{ docker_subnet }}' }
        - { regexp: 'ipv4_address: 172.20.0.10', replace: 'ipv4_address: {{ db_ip }}' }
        - { regexp: 'ipv4_address: 172.20.0.5', replace: 'ipv4_address: {{ web_ip }}' }
      run_once: true

    - name: Set permissions for configuration files  # noqa run-once
      ansible.builtin.file:
        path: "{{ project_dir }}/{{ item }}"
        mode: '0644'
        owner: ubuntu
        group: ubuntu
      loop:
        - haproxy/reverse/haproxy.cfg
        - nginx/ingress/default.conf
        - nginx/ingress/nginx.conf
      run_once: true

    - name: Check if jsondiff is installed  # noqa run-once
      ansible.builtin.command: python3 -c "import jsondiff"
      ignore_errors: true
      register: jsondiff_check
      run_once: true

    - name: Install required Python dependencies (jsondiff)  # noqa run-once
      ansible.builtin.pip:
        name: jsondiff
        executable: pip3
      become: true
      when: jsondiff_check is defined and jsondiff_check.failed
      run_once: true

    - name: Re-check if jsondiff is now installed  # noqa run-once
      ansible.builtin.command: python3 -c "import jsondiff"
      ignore_errors: true
      register: jsondiff_check_post
      run_once: true

    - name: Debug jsondiff installation status  # noqa run-once
      ansible.builtin.debug:
        msg: "jsondiff is {{ 'installed' if not jsondiff_check_post.failed else 'not installed' }}"
      run_once: true

    - name: Deploy the stack using compose.stack.yaml  # noqa run-once
      ansible.builtin.docker_stack:
        name: "{{ project_name }}"
        state: present
        compose:
          - "{{ project_dir }}/compose.stack.yaml"
      environment:
        "{{ env_vars }}"
      delegate_to: "{{ manager_node }}"
      run_once: true

    - name: Verify stack deployment  # noqa run-once
      ansible.builtin.shell: docker stack ps {{ project_name }}
      delegate_to: "{{ manager_node }}"
      register: stack_status
      run_once: true

    - name: Display stack deployment status  # noqa run-once
      ansible.builtin.debug:
        msg: "{{ stack_status.stdout }}"
      run_once: true
