---
- name: Install Clickhouse
  hosts: clickhouse
  become: true
  handlers:
    - name: Start clickhouse service
      ansible.builtin.service:
        name: clickhouse-server
        state: restarted
        enabled: true

  tasks:
    # Проверка архитектуры системы
    - name: Check system architecture
      ansible.builtin.command: uname -m
      register: arch_check
      changed_when: false

    # Исправление репозиториев для arm64
    - name: Fix sources.list for arm64
      ansible.builtin.copy:
        dest: /etc/apt/sources.list
        content: |
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-backports main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-security main restricted universe multiverse
        mode: '0644'
      when: "'aarch64' in arch_check.stdout or 'arm64' in arch_check.stdout"

    # Очистка кэша APT
    - name: Clean APT cache
      ansible.builtin.command: >
        bash -c "apt-get clean && rm -rf /var/lib/apt/lists/*"
      changed_when: false

    # Обновление кэша APT
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

    # Скачивание DEB-пакетов
    - name: Handle Clickhouse package downloads
      block:
        - name: Download Clickhouse packages
          ansible.builtin.get_url:
            url: >
              https://packages.clickhouse.com/deb/pool/main/c/clickhouse/
              {{ item }}_{{ clickhouse_version }}_
              {{ 'arm64' if 'aarch64' in arch_check.stdout else arch_check.stdout }}.deb
            dest: "./{{ item }}_{{ clickhouse_version }}_{{ 'arm64' if 'aarch64' in arch_check.stdout else arch_check.stdout }}.deb"
            mode: '0644'
          with_items: "{{ clickhouse_packages }}"
      rescue:
        - name: Fail on missing packages
          ansible.builtin.fail:
            msg: "Failed to download one or more ClickHouse packages. Please check the version and URLs."
      always:
        - name: Always clean up temporary files
          ansible.builtin.file:
            path: "./{{ item }}_{{ clickhouse_version }}_{{ 'arm64' if 'aarch64' in arch_check.stdout else arch_check.stdout }}.deb"
            state: absent
          with_items: "{{ clickhouse_packages }}"

    # Установка DEB-пакетов
    - name: Install clickhouse-common-static first
      ansible.builtin.apt:
        deb: "./clickhouse-common-static_{{ clickhouse_version }}_{{ 'arm64' if 'aarch64' in arch_check.stdout else arch_check.stdout }}.deb"
      notify: Start clickhouse service

    - name: Install remaining clickhouse packages
      ansible.builtin.apt:
        deb: "./{{ item }}_{{ clickhouse_version }}_{{ 'arm64' if 'aarch64' in arch_check.stdout else arch_check.stdout }}.deb"
      with_items:
        - clickhouse-client
        - clickhouse-server
      notify: Start clickhouse service

    # Исправление зависимостей
    - name: Fix broken dependencies
      ansible.builtin.command: >
        bash -c "apt-get install -f -y"
      changed_when: false

    # Применяем изменения (запускаем обработчики)
    - name: Flush handlers
      ansible.builtin.meta: flush_handlers

    # Создаем базу данных
    - name: Create database
      ansible.builtin.command: "clickhouse-client -q 'CREATE DATABASE IF NOT EXISTS logs;'"
      register: create_db
      failed_when: create_db.rc != 0 and create_db.rc != 82
      changed_when: create_db.rc == 0

- name: Install Vector
  hosts: vector
  become: true
  handlers:
    - name: Restart Vector service
      ansible.builtin.service:
        name: vector
        state: restarted
        enabled: true

  tasks:
    # Проверка архитектуры системы
    - name: Check system architecture
      ansible.builtin.command: uname -m
      register: arch_check
      changed_when: false

    # Создание директории для установки
    - name: Ensure installation directory exists
      ansible.builtin.file:
        path: /opt/vector
        state: directory
        mode: '0755'

    # Скачивание дистрибутива Vector
    - name: Download Vector distribution
      ansible.builtin.get_url:
        url: >
          https://packages.timber.io/vector/{{ vector_version }}/vector-{{ vector_version }}-{{ vector_architecture }}-unknown-linux-musl.tar.gz
        dest: /tmp/vector-{{ vector_version }}.tar.gz
        mode: '0644'

    # Распаковка дистрибутива
    - name: Extract Vector distribution
      ansible.builtin.unarchive:
        src: /tmp/vector-{{ vector_version }}.tar.gz
        dest: /opt/vector
        remote_src: true

    # Создание символической ссылки
    - name: Create symbolic link for easier access
      ansible.builtin.file:
        src: /opt/vector/vector-{{ vector_version }}-{{ vector_architecture }}-unknown-linux-musl/bin/vector
        dest: /usr/local/bin/vector
        state: link

    # Деплой конфигурации через шаблон
    - name: Deploy Vector configuration using Jinja2 template
      ansible.builtin.template:
        src: "{{ playbook_dir }}/templates/vector_config.j2"
        dest: /etc/vector/vector.toml
        owner: root
        group: root
        mode: '0644'
      notify: Restart Vector service

    # Убедимся, что служба Vector запущена
    - name: Ensure Vector service is enabled and started
      ansible.builtin.systemd:
        name: vector
        enabled: true
        state: started
        daemon_reload: true
