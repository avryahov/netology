---
- name: Install ClickHouse and Vector
  hosts: all
  become: true
  tasks:
    # ========================
    # Установка ClickHouse
    # ========================
    - name: Install ClickHouse dependencies
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - gnupg
        state: present
        update_cache: yes
      when: "'clickhouse' in group_names"

    - name: Add ClickHouse repository key
      ansible.builtin.apt_key:
        url: https://repo.clickhouse.com/CLICKHOUSE-GPG-KEY
        state: present
      when: "'clickhouse' in group_names"

    - name: Add ClickHouse repository
      ansible.builtin.apt_repository:
        repo: "deb https://repo.clickhouse.com/deb/stable/main/ any main"
        state: present
      when: "'clickhouse' in group_names"

    - name: Install ClickHouse packages
      ansible.builtin.apt:
        name:
          - clickhouse-server
          - clickhouse-client
        state: present
      when: "'clickhouse' in group_names"

    - name: Start ClickHouse service
      ansible.builtin.service:
        name: clickhouse-server
        state: started
        enabled: true
      when: "'clickhouse' in group_names"

    - name: Create database
      ansible.builtin.command: "clickhouse-client -q 'CREATE DATABASE IF NOT EXISTS logs;'"
      register: create_db
      failed_when: create_db.rc != 0 and create_db.rc != 82
      changed_when: create_db.rc == 0
      when: "'clickhouse' in group_names"

    # ========================
    # Установка Vector
    # ========================
    - name: Ensure installation directory exists
      ansible.builtin.file:
        path: /opt/vector
        state: directory
        mode: '0755'
      when: "'vector' in group_names"

    - name: Download Vector distribution
      ansible.builtin.get_url:
        url: >
          https://packages.timber.io/vector/{{ vector_version }}/vector-{{ vector_version }}-{{ vector_architecture }}-unknown-linux-musleabi.tar.gz
        dest: /tmp/vector-{{ vector_version }}.tar.gz
        mode: '0644'
      when: "'vector' in group_names"

    - name: Extract Vector distribution
      ansible.builtin.unarchive:
        src: /tmp/vector-{{ vector_version }}.tar.gz
        dest: /opt/vector
        remote_src: true
      when: "'vector' in group_names"

    - name: Create symbolic link for easier access
      ansible.builtin.file:
        src: /opt/vector/vector-{{ vector_architecture }}-unknown-linux-musleabi/bin/vector
        dest: /usr/local/bin/vector
        state: link
      when: "'vector' in group_names"

    - name: Ensure configuration directory exists
      ansible.builtin.file:
        path: /etc/vector
        state: directory
        mode: '0755'
      when: "'vector' in group_names"

    - name: Deploy Vector configuration using Jinja2 template
      ansible.builtin.template:
        src: "{{ playbook_dir }}/templates/vector_config.j2"
        dest: /etc/vector/vector.toml
        owner: root
        group: root
        mode: '0644'
      notify: Restart Vector service
      when: "'vector' in group_names"

    - name: Validate Vector configuration file format
      ansible.builtin.command: >
        bash -c "vector validate --config-toml /etc/vector/vector.toml"
      register: config_validation
      failed_when: config_validation.rc != 0
      changed_when: false
      when: "'vector' in group_names"

    - name: Kill existing Vector processes
      ansible.builtin.command: >
        bash -c "pkill vector || true"
      changed_when: false
      when: "'vector' in group_names"

    - name: Start Vector directly
      ansible.builtin.command: >
        bash -c "/usr/local/bin/vector --config /etc/vector/vector.toml &"
      async: 0
      poll: 0
      failed_when: false
      changed_when: false
      when: "'vector' in group_names"

  handlers:
    - name: Restart Vector service
      ansible.builtin.command: >
        bash -c "pkill vector || true && /usr/local/bin/vector --config /etc/vector/vector.toml &"
      changed_when: false