# Сборка Docker-образов и контейнеров
- name: Build Docker images for ClickHouse and Vector
  hosts: localhost
  vars_files:
    - group_vars/all/vars.yml
  tasks:
    - name: Debug decrypted password
      ansible.builtin.debug:
        msg: "Decrypted password is {{ common_password }}"

    - name: Build Docker image for ClickHouse
      ansible.builtin.command: >
        docker build
        --build-arg ROOT_PASSWORD="{{ common_password }}"
        -t clickhouse-host .
      args:
        chdir: ./base
      changed_when: false

    - name: Build Docker image for Vector
      ansible.builtin.command: >
        docker build
        --build-arg ROOT_PASSWORD="{{ common_password }}"
        -t vector-host .
      args:
        chdir: ./base  # Путь к Dockerfile
      changed_when: false

    - name: Pull Nginx
      ansible.builtin.command: >
        docker pull nginx
      changed_when: false

    # Запуск контейнеров через docker-compose
    - name: Start containers with docker-compose
      ansible.builtin.command: >
        docker compose -p 08-ansible-02-playbook up -d
      changed_when: false

# Установка ClickHouse
- name: Install ClickHouse
  hosts: clickhouse
  become: true
  handlers:
    - name: Start clickhouse service
      ansible.builtin.service:
        name: clickhouse-server
        state: restarted
        enabled: true

  tasks:
    # Проверка архитектуры системы
    - name: Check system architecture
      ansible.builtin.command: uname -m
      register: arch_check
      changed_when: false

    # Исправление репозиториев для arm64
    - name: Fix sources.list for arm64
      ansible.builtin.copy:
        dest: /etc/apt/sources.list
        content: |
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-backports main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-security main restricted universe multiverse
        mode: '0644'
      when: clickhouse_architecture == "arm64"

    # Обновление кэша APT
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

    # Скачивание и установка ClickHouse пакетов
    - name: Handle Clickhouse package downloads and installation
      block:
        - name: Debug ClickHouse package URLs
          ansible.builtin.debug:
            msg: "Downloading from: https://packages.clickhouse.com/deb/pool/main/c/clickhouse/
            {{ item }}_{{ clickhouse_version }}_{{ clickhouse_architecture }}.deb"
          with_items: "{{ clickhouse_packages }}"

        - name: Download Clickhouse packages
          ansible.builtin.get_url:
            url: https://packages.clickhouse.com/deb/pool/main/c/clickhouse/{{ item }}_{{ clickhouse_version }}_{{ clickhouse_architecture }}.deb
            dest: "/tmp/{{ item }}_{{ clickhouse_version }}_{{ clickhouse_architecture }}.deb"
            mode: '0644'
          retries: 3
          delay: 5
          with_items: "{{ clickhouse_packages }}"

        - name: Check if DEB package exists
          ansible.builtin.stat:
            path: "/tmp/{{ item }}_{{ clickhouse_version }}_{{ clickhouse_architecture }}.deb"
          register: deb_file_stat
          with_items: "{{ clickhouse_packages }}"

        - name: Fail if DEB package is missing
          ansible.builtin.fail:
            msg: "DEB package not found: /tmp/{{ item }}_{{ clickhouse_version }}_{{ clickhouse_architecture }}.deb"
          when: not item.stat.exists
          with_items: "{{ deb_file_stat.results }}"

        - name: Install clickhouse-common-static first
          ansible.builtin.apt:
            deb: "/tmp/clickhouse-common-static_{{ clickhouse_version }}_{{ clickhouse_architecture }}.deb"
          notify: Start clickhouse service

        - name: Install remaining clickhouse packages
          ansible.builtin.apt:
            deb: "/tmp/{{ item }}_{{ clickhouse_version }}_{{ clickhouse_architecture }}.deb"
          with_items:
            - clickhouse-client
            - clickhouse-server
          notify: Start clickhouse service

      always:
        - name: Clean up temporary files
          ansible.builtin.file:
            path: "/tmp/{{ item }}_{{ clickhouse_version }}_{{ clickhouse_architecture }}.deb"
            state: absent
          with_items: "{{ clickhouse_packages }}"

    # Исправление зависимостей
    - name: Fix broken dependencies
      ansible.builtin.command: >
        bash -c "apt-get install -f -y"
      changed_when: false

    # Применяем изменения (запускаем обработчики)
    - name: Flush handlers
      ansible.builtin.meta: flush_handlers

    # Обновление конфигурации ClickHouse
    - name: Ensure <http_port>8123</http_port> exists
      ansible.builtin.lineinfile:
        path: /etc/clickhouse-server/config.xml
        regexp: '^\\s*<http_port>'
        line: '    <http_port>8123</http_port>'
        insertafter: '</http_options_response>'
        create: true
        mode: '0644'

    - name: Ensure <tcp_port>9000</tcp_port> exists
      ansible.builtin.lineinfile:
        path: /etc/clickhouse-server/config.xml
        regexp: '^\\s*<tcp_port>'
        line: '    <tcp_port>9000</tcp_port>'
        insertafter: '</http_options_response>'
        create: true
        mode: '0644'

    - name: Ensure listen_host for IPv4 is set
      ansible.builtin.lineinfile:
        path: /etc/clickhouse-server/config.xml
        regexp: '^\\s*<listen_host>0.0.0.0'
        line: '    <listen_host>0.0.0.0</listen_host>'
        insertafter: '<interserver_http_port>'
        create: true
        mode: '0644'

    - name: Restart ClickHouse service
      ansible.builtin.service:
        name: clickhouse-server
        state: restarted

    - name: Check ClickHouse service status
      ansible.builtin.service:
        name: clickhouse-server
        state: started
      register: clickhouse_status

    - name: Debug ClickHouse service status
      ansible.builtin.debug:
        msg: "ClickHouse service is running: {{ clickhouse_status.state }}"

    - name: Show ClickHouse logs (useful for debugging)
      ansible.builtin.shell: >
        tail -n 50 /var/log/clickhouse-server/clickhouse-server.log || true
      register: ch_logs
      changed_when: false
      failed_when: false

    - name: Debug ClickHouse logs
      ansible.builtin.debug:
        var: ch_logs.stdout

    # Ждём пока ClickHouse действительно станет доступен
    - name: Wait for ClickHouse to become available via client
      ansible.builtin.command: "clickhouse-client -q 'SELECT 1'"
      register: ch_ready
      retries: 10
      delay: 3
      until: ch_ready.rc == 0
      changed_when: false

    # Создаем базу данных
    - name: Create nginxdb database in ClickHouse
      ansible.builtin.command: >
        clickhouse-client -q "CREATE DATABASE IF NOT EXISTS nginxdb;"
      register: create_nginxdb
      failed_when: create_nginxdb.rc != 0 and create_nginxdb.rc != 82
      changed_when: create_nginxdb.rc == 0

    - name: Create access_logs table in nginxdb
      ansible.builtin.command: >
        clickhouse-client -q "
        CREATE TABLE IF NOT EXISTS nginxdb.access_logs (
            message String
        )
        ENGINE = MergeTree()
        ORDER BY tuple();"
      register: create_access_logs
      failed_when: create_access_logs.rc != 0 and create_access_logs.rc != 82
      changed_when: create_access_logs.rc == 0

    - name: Create materialized view for parsed logs
      ansible.builtin.command: >
        clickhouse-client -q "{{ lookup('template', 'templates/materialized_view.sql.j2') }}"
      register: create_materialized_view
      failed_when: create_materialized_view.rc != 0 and create_materialized_view.rc != 82
      changed_when: create_materialized_view.rc == 0

    # Проверка статуса ClickHouse
    - name: Check ClickHouse service status
      ansible.builtin.uri:
        url: http://localhost:8123/ping
        method: GET
        status_code: 200
      register: clickhouse_status
      retries: 5
      delay: 5
      until: clickhouse_status.status == 200

# Установка Vector
- name: Install Vector
  hosts: vector
  become: true
  handlers:
    - name: Restart Vector service
      ansible.builtin.command: >
        bash -c "pkill vector || true && /usr/local/bin/vector --config /etc/vector/vector.toml &"
      changed_when: false

  tasks:
    # Проверка архитектуры системы
    - name: Check system architecture
      ansible.builtin.command: uname -m
      register: arch_check
      changed_when: false

    # Создание директории для установки
    - name: Ensure installation directory exists
      ansible.builtin.file:
        path: /opt/vector
        state: directory
        mode: '0755'

    # Скачивание дистрибутива Vector
    - name: Download Vector distribution
      ansible.builtin.get_url:
        url: >
          https://packages.timber.io/vector/{{ vector_version }}/vector-{{ vector_version }}-{{ vector_architecture }}-unknown-linux-musleabi.tar.gz
        dest: /tmp/vector-{{ vector_version }}.tar.gz
        mode: '0644'

    # Распаковка дистрибутива
    - name: Extract Vector distribution
      ansible.builtin.unarchive:
        src: /tmp/vector-{{ vector_version }}.tar.gz
        dest: /opt/vector
        remote_src: true

    # Логирование содержимого каталога после распаковки
    - name: Debug directory contents after extraction
      ansible.builtin.command: ls -la /opt/vector
      register: vector_dir_contents
      changed_when: false

    - name: Show extracted files
      ansible.builtin.debug:
        var: vector_dir_contents.stdout

    # Создание символической ссылки
    - name: Create symbolic link for easier access
      ansible.builtin.file:
        src: /opt/vector/vector-{{ vector_architecture }}-unknown-linux-musleabi/bin/vector
        dest: /usr/local/bin/vector
        state: link
      when: vector_dir_contents.stdout is search('vector')

    # Создание директории для конфигурации
    - name: Ensure configuration directory exists
      ansible.builtin.file:
        path: /etc/vector
        state: directory
        mode: '0755'

    # Создание каталога data_dir
    - name: Ensure data directory exists
      ansible.builtin.file:
        path: /var/lib/vector
        state: directory
        mode: '0755'

    # Развертывание конфигурации Vector
    - name: Deploy Vector configuration using Jinja2 template
      ansible.builtin.template:
        src: "{{ playbook_dir }}/templates/vector_config.j2"
        dest: /etc/vector/vector.toml
        owner: root
        group: root
        mode: '0644'
      notify: Restart Vector service

    # Проверка формата конфигурационного файла
    - name: Validate Vector configuration file format
      ansible.builtin.command: >
        bash -c "vector validate --config-toml /etc/vector/vector.toml"
      register: config_validation
      changed_when: false

# Проверка работоспособности систем
- name: Verify the entire setup (Nginx, Vector, ClickHouse)
  hosts: localhost
  become: false
  vars_files:
    - group_vars/all/vars.yml
  tasks:
    # Проверка работоспособности Nginx
    - name: Check if Nginx is running and accessible
      ansible.builtin.uri:
        url: http://localhost:8080
        method: GET
        status_code: 200
      register: nginx_status
      retries: 5
      delay: 3
      until: nginx_status.status == 200
      ignore_errors: true

    - name: Debug Nginx status (running)
      ansible.builtin.debug:
        msg: "Nginx is up and running"
      when: nginx_status.status == 200

    - name: Debug Nginx status (not accessible)
      ansible.builtin.debug:
        msg: "Nginx is not accessible"
      when: nginx_status.status != 200

    # Проверка наличия логов Nginx
    - name: Check if Nginx logs are being generated
      ansible.builtin.command: >
        docker exec nginx-01 bash -c "cat /var/log/nginx/my_access.log"
      register: nginx_logs
      changed_when: false
      failed_when: nginx_logs.rc != 0 and "'No such file or directory'" in nginx_logs.stderr

    - name: Debug Nginx logs
      ansible.builtin.debug:
        msg: 'Nginx logs found: "{{ nginx_logs.stdout }}" if nginx_logs.stdout else "No Nginx logs found"'

    # Проверка работы Vector
    - name: Check if Vector is running
      ansible.builtin.command: >
        docker exec vector-01 bash -c "pgrep vector"
      register: vector_status
      changed_when: false
      failed_when: vector_status.rc != 0

    - name: Debug Vector status
      ansible.builtin.debug:
        msg: '"Vector is running" if vector_status.rc == 0 else "Vector is not running"'

    # Проверка подключения Vector к ClickHouse
    - name: Check if Vector can connect to ClickHouse
      ansible.builtin.command: >
        docker exec vector-01 bash -c "curl -s -o /dev/null -w '%{http_code}' http://clickhouse-01:8123/ping"
      register: clickhouse_ping
      changed_when: false
      failed_when: clickhouse_ping.stdout != "200"

    - name: Debug ClickHouse connection status
      ansible.builtin.debug:
        msg: '"Vector can connect to ClickHouse" if clickhouse_ping.stdout == "200" else "Vector cannot connect to ClickHouse"'

    # Проверка наличия данных в ClickHouse
    - name: Check if data exists in ClickHouse (nginxdb.access_logs)
      ansible.builtin.command: >
        docker exec clickhouse-01 clickhouse-client -q "SELECT COUNT(*) FROM nginxdb.access_logs"
      register: clickhouse_data_count
      changed_when: false
      failed_when: clickhouse_data_count.rc != 0

    - name: Debug ClickHouse data count
      ansible.builtin.debug:
        msg: '"Number of rows in nginxdb.access_logs: {{ clickhouse_data_count.stdout }}"'

    # Проверка материализованного представления
    - name: Check if data exists in ClickHouse materialized view (nginxdb.access_logs_view)
      ansible.builtin.command: >
        docker exec clickhouse-01 clickhouse-client -q "SELECT COUNT(*) FROM nginxdb.access_logs_view"
      register: clickhouse_view_count
      changed_when: false
      failed_when: clickhouse_view_count.rc != 0

    - name: Debug ClickHouse materialized view count
      ansible.builtin.debug:
        msg: '"Number of rows in nginxdb.access_logs_view: {{ clickhouse_view_count.stdout }}"'
