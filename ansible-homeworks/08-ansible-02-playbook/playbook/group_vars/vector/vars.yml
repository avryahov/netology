---
vector_version: "0.45.0"
vector_architecture: "arm"
vector_data_dir: "/var/lib/vector"

vector_sources:
  http_input:
    type: "http_server"
    address: "0.0.0.0:8686"
    encoding: "json"  # Простая строка для источника http_server
    headers: ["User-Agent"]
    host_key: "hostname"
    method: "POST"
    path: "/"
    path_key: "path"
    query_parameters: ["application"]
    response_code: 200
    strict_path: "true"
  internal_metrics:
    type: "internal_metrics"

vector_sinks:
  console:
    type: "console"
    inputs:
      - "http_input"
      - "internal_metrics"
    encoding:
      codec: "json"  # Структура для выхода console
  clickhouse_output:
    type: "clickhouse"
    inputs:
      - "http_input"
    endpoint: "http://clickhouse-01:8123"
    database: "logs"
    table: "vector"
    compression: "gzip"
    format: "json_each_row"
    healthcheck: false