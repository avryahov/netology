# === PLAY 1: Установка ClickHouse ===
- name: Install Clickhouse
  hosts: clickhouse
  tags:
    - clickhouse

  # Хендлер: перезапуск clickhouse при изменениях
  handlers:
    - name: Start clickhouse service
      become: true
      ansible.builtin.systemd:
        name: clickhouse-server
        state: restarted
        enabled: true

  # Предзадачи
  pre_tasks:
    # Установка дополнительной библиотеки python3 по работе с xml
    - name: Ensure python3-lxml is installed (required for xml module)
      become: true
      ansible.builtin.apt:
        name: python3-lxml
        state: present
        update_cache: true

  tasks:
    # Скачиваем .deb пакеты ClickHouse
    - name: Get ClickHouse distrib
      ansible.builtin.get_url:
        url: "https://packages.clickhouse.com/deb/pool/main/c/{{ item }}/{{ item }}_{{ clickhouse_version }}{{ clickhouse_package_suffixes[item] }}.deb"
        dest: "./{{ item }}_{{ clickhouse_version }}{{ clickhouse_package_suffixes[item] }}.deb"
        mode: '0644'
      loop: "{{ clickhouse_packages }}"

    # Устанавливаем ClickHouse .deb пакеты через dpkg
    - name: Install ClickHouse packages via dpkg
      become: true
      ansible.builtin.command:
        cmd: "dpkg -i {{ item }}_{{ clickhouse_version }}{{ clickhouse_package_suffixes[item] }}.deb"
      loop: "{{ clickhouse_packages }}"
      loop_control:
        label: "{{ item }}"
      register: dpkg_result
      changed_when: false
      until: dpkg_result is succeeded

    # Принудительный вызов всех хендлеров (перезапуск ClickHouse)
    - name: Flush handlers
      ansible.builtin.meta: flush_handlers

    # Проверка наличия HTTP порта
    - name: Ensure <http_port>8123</http_port> exists
      become: true
      community.general.xml: # noqa syntax-check[unknown-module]
        file: /etc/clickhouse-server/config.xml
        xpath: /clickhouse/http_port
        value: "8123"
        state: present

    # Проверка наличия TCP порта
    - name: Ensure <tcp_port>9000</tcp_port> exists
      become: true
      community.general.xml: # noqa syntax-check[unknown-module]
        file: /etc/clickhouse-server/config.xml
        xpath: /clickhouse/tcp_port
        value: "9000"
        state: present

    # Проверка наличия прослушивания хоста
    - name: Ensure listen_host is set to allow external connections
      become: true
      community.general.xml: # noqa syntax-check[unknown-module]
        file: /etc/clickhouse-server/config.xml
        xpath: /clickhouse/listen_host
        value: "0.0.0.0"
        state: present
      notify: Start clickhouse service

    # Проверка старта сервера
    - name: Check ClickHouse service status
      ansible.builtin.service:
        name: clickhouse-server
        state: started
      register: clickhouse_status

    # Проверка работы клиента
    - name: Wait for ClickHouse to become available via client
      ansible.builtin.command: "clickhouse-client --host=127.0.0.1 -q 'SELECT 1'"
      register: ch_ready
      retries: 10
      delay: 3
      until: ch_ready.rc == 0
      changed_when: false

    # Создаём БД logs в ClickHouse
    - name: Create database
      ansible.builtin.command: "clickhouse-client --host=127.0.0.1 -q 'create database logs;'"
      register: create_db
      failed_when: create_db.rc != 0 and create_db.rc != 82
      changed_when: "'CREATE DATABASE' in create_db.stdout"

    # Проверка доступности порта 8123 через HTTP
    - name: Ensure port 8123 is accessible via HTTP
      ansible.builtin.uri:
        url: http://127.0.0.1:8123/
        return_content: false
        status_code: 200
      register: http_check
      until: http_check.status == 200
      retries: 5
      delay: 3

    # Создание таблицы server_logs
    - name: Create table server_logs in database logs
      ansible.builtin.command: |
        clickhouse-client --host=127.0.0.1 -q '
          CREATE TABLE IF NOT EXISTS logs.server_logs (
            timestamp String,
            level String,
            message String
          ) ENGINE = MergeTree()
          ORDER BY tuple(timestamp);
        '
      register: create_table
      changed_when: "'CREATE TABLE' in create_table.stdout"

    # Проверка наличия таблицы
    - name: Verify that table server_logs exists
      ansible.builtin.command: |
        clickhouse-client --host=127.0.0.1 -q 'SHOW TABLES FROM logs;'
      when: not ansible_check_mode
      register: tables
      until: "'server_logs' in tables.stdout"
      retries: 5
      delay: 2
      changed_when: false

# === PLAY 2: Установка и настройка Vector ===
- name: Install Vector
  hosts: vector
  tags:
    - vector
  become: true

  # Хендлер: перезапуск vector при изменении конфига
  handlers:
    - name: Restart vector
      ansible.builtin.systemd:
        name: vector
        state: restarted
        enabled: true
        daemon_reload: true  # Важно: перечитать unit-файл перед рестартом

  tasks:
    # Скачиваем официальный .deb дистрибутив Vector
    - name: Download Vector .deb package
      ansible.builtin.get_url:
        url: "https://packages.timber.io/vector/{{ vector_version }}/vector_{{ vector_version }}-1{{ vector_package_suffix }}.deb"
        dest: "./vector_{{ vector_version }}-1{{ vector_package_suffix }}.deb"
        mode: '0644'

    # Устанавливаем Vector
    - name: Install Vector via dpkg
      ansible.builtin.command:
        cmd: "dpkg -i ./vector_{{ vector_version }}-1{{ vector_package_suffix }}.deb"
      register: dpkg_result
      changed_when: false
      until: dpkg_result is succeeded

    # Копируем конфигурационный файл из шаблона
    - name: Deploy Vector config
      ansible.builtin.template:
        src: templates/vector.toml.j2
        dest: /etc/vector/vector.toml
        mode: '0644'

    # Проверка наличия конфига перед валидацией
    - name: Ensure Vector config exists before restart
      ansible.builtin.stat:
        path: /etc/vector/vector.toml
      register: config_stat

    # Проверка корректности конфигурационного файла
    - name: Validate Vector config before restart
      ansible.builtin.command: "vector validate /etc/vector/vector.toml"
      changed_when: false
      ignore_errors: false
      when: config_stat.stat.exists

    # Поиск systemd unit-файла Vector
    - name: Find Vector systemd unit file path
      ansible.builtin.find:
        paths:
          - /etc/systemd/system
          - /lib/systemd/system
          - /usr/lib/systemd/system
        patterns: 'vector.service'
      register: vector_unit_file

    # Отладка: путь к найденному unit-файлу
    - name: Debug vector unit file path
      ansible.builtin.debug:
        var: vector_unit_file.files[0].path

    # Ошибка, если unit-файл не найден
    - name: Fail if Vector systemd unit file not found
      ansible.builtin.fail:
        msg: "Vector systemd unit file not found in expected locations!"
      when: vector_unit_file.matched == 0

    # Обновляем ExecStart для использования кастомного конфига
    - name: Update ExecStart in Vector unit to use custom config
      ansible.builtin.lineinfile:
        path: "{{ vector_unit_file.files[0].path }}"
        regexp: '^ExecStart='
        line: 'ExecStart=/usr/bin/vector --config /etc/vector/vector.toml'
        backrefs: false
      notify: Restart vector

    # Принудительный вызов хендлеров (рестарт vector после обновления unit)
    - name: Flush handlers (after unit file change)
      ansible.builtin.meta: flush_handlers

    # Ожидание запуска Vector (после рестарта)
    - name: Wait for Vector to become available
      ansible.builtin.wait_for:
        state: started
        timeout: 60

    # Убедиться, что vector работает и в автозагрузке
    - name: Ensure vector service is running
      ansible.builtin.systemd:
        name: vector
        enabled: true
        state: started

    # Создание тестового файла для логов
    - name: Ensure test log file exists
      ansible.builtin.file:
        path: /var/log/test.log
        state: touch
        mode: '0644'

    # Добавляем тестовую строку в лог
    - name: Append test log entry for Vector
      ansible.builtin.lineinfile:
        path: /var/log/test.log
        line: "2025-05-18T11:06:00 INFO: Test log message from Vector"
        create: true
        mode: '0644'

    # Ждём, пока Vector обработает лог
    - name: Wait for Vector to process the new log
      ansible.builtin.pause:
        seconds: 60

    # Проверяем, появилась ли запись в ClickHouse
    - name: Check if test log is in ClickHouse
      delegate_to: clickhouse-01  # Выполняется на хосте ClickHouse
      ansible.builtin.command: |
        clickhouse-client --host=127.0.0.1 -q "
          SELECT * FROM logs.server_logs
          WHERE message LIKE '%Test log message from Vector%'
          LIMIT 1;
        "
      register: ch_query_result
      ignore_errors: false
      changed_when: false

    # Отладка: вывод результата запроса
    - name: Debug ClickHouse query result
      ansible.builtin.debug:
        var: ch_query_result.stdout_lines

    # Завершаем с ошибкой, если лог не найден
    - name: Fail if test log not found in ClickHouse
      ansible.builtin.assert:
        that:
          - "'Test log message from Vector' in ch_query_result.stdout"
        fail_msg: "Test log NOT found in ClickHouse. Integration failed."
        success_msg: "Test log successfully found in ClickHouse. Integration works!"

# === PLAY 3: Установка и настройка LightHouse ===
- name: Install LightHouse
  hosts: lighthouse
  become: true
  tags:
    - lighthouse

  # Предзадачи
  pre_tasks:
    # Установка unzip
    - name: Install unzip (Debian)
      ansible.builtin.apt:
        name: unzip
        state: present
      when: ansible_os_family == 'Debian'

    - name: Install unzip (RedHat)
      ansible.builtin.dnf:
        name: unzip
        state: present
      when: ansible_os_family == 'RedHat'

  # Хендлер: перезапуск nginx при изменениях
  handlers:
    - name: Restart nginx
      ansible.builtin.service:
        name: nginx
        state: restarted

  tasks:
    # Установка nginx
    - name: Install Nginx
      ansible.builtin.apt:
        name: nginx
        state: present
        update_cache: true
      when: ansible_os_family == 'Debian'

    - name: Install Nginx (RedHat)
      ansible.builtin.dnf:
        name: nginx
        state: present
      when: ansible_os_family == 'RedHat'

    # Создание директории под Lighthouse
    - name: Ensure lighthouse directory exists
      ansible.builtin.file:
        path: "{{ lighthouse_dest }}"
        state: directory
        mode: '0755'

    # Скачиваем LightHouse из GitHub
    - name: Download Lighthouse static files
      ansible.builtin.get_url:
        url: "https://github.com/VKCOM/lighthouse/archive/refs/heads/{{ lighthouse_version }}.zip"
        dest: "/tmp/lighthouse.zip"
        mode: '0644'

    # Распаковываем
    - name: Unarchive Lighthouse
      ansible.builtin.unarchive:
        src: "/tmp/lighthouse.zip"
        dest: "/var/www"
        remote_src: true

    # Переименовываем директорию в стандартную
    - name: Move Lighthouse static files to target location
      ansible.builtin.command:
        cmd: mv /var/www/lighthouse-{{ lighthouse_version }} {{ lighthouse_dest }}
      args:
        creates: "{{ lighthouse_dest }}"

    # Удаляем zip-архив
    - name: Clean up lighthouse zip file
      ansible.builtin.file:
        path: /tmp/lighthouse.zip
        state: absent

    # Копируем конфиг nginx
    - name: Deploy Nginx config for Lighthouse
      ansible.builtin.template:
        src: templates/lighthouse-nginx.conf.j2
        dest: /etc/nginx/sites-available/lighthouse.conf
        mode: '0644'

    # Удаляем конфиг nginx по умолчанию
    - name: Clean up Nginx default config
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    # Ссылка в sites-enabled
    - name: Enable Lighthouse site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/lighthouse.conf
        dest: /etc/nginx/sites-enabled/lighthouse.conf
        state: link
        force: true
      notify: Restart nginx

    # Убедимся, что nginx запущен
    - name: Ensure nginx is running
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: true

    # Проверка, что LightHouse интерфейс доступен по HTTP
    - name: Check LightHouse HTTP response on localhost
      ansible.builtin.uri:
        url: http://localhost/
        status_code: 200
        return_content: true
      register: lighthouse_http

    # Убедимся, что в HTML содержится что-то от LightHouse
    - name: Assert LightHouse HTML page is present
      ansible.builtin.assert:
        that:
          - "'LightHouse' in lighthouse_http.content or 'VKCOM' in lighthouse_http.content"
        fail_msg: "LightHouse UI is NOT accessible or content is incorrect."
        success_msg: "LightHouse UI is working."

    # Проверка соединения с ClickHouse с хоста LightHouse
    - name: Test connection to ClickHouse from LightHouse
      ansible.builtin.uri:
        url: "http://{{ hostvars['clickhouse-01']['ansible_host'] }}:8123/"
        status_code: 200
        return_content: true
      register: ch_response

    # Проверка, что ClickHouse вернул 'Ok.'
    - name: Assert ClickHouse returned OK from LightHouse
      ansible.builtin.assert:
        that:
          - "'Ok.' in ch_response.content"
        fail_msg: "LightHouse cannot reach ClickHouse at port 8123."
        success_msg: "ClickHouse is reachable from LightHouse."
